<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PUMA TRAVEL - FINAL BOSS</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#050505;
    color:#fff;
}

/* HEADER */
.header{
    text-align:center;
    padding:15px;
    background:#111;
    border-bottom:1px solid gold;
}
.header h1{
    color:gold;
    margin:0;
}

/* NAV TAB */
.nav{
    display:flex;
    justify-content:space-around;
    background:#0f0f0f;
    border-bottom:1px solid #222;
}
.nav button{
    flex:1;
    padding:12px;
    background:none;
    border:none;
    color:#aaa;
    font-weight:bold;
}
.nav button.active{
    color:gold;
    border-bottom:2px solid gold;
}

/* SECTION */
.section{
    display:none;
    padding:15px;
}
.section.active{
    display:block;
}

/* CARD */
.card{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,215,0,0.2);
    padding:12px;
    margin:10px 0;
    border-radius:10px;
}
.price{color:gold;font-weight:bold;}

/* INPUT */
input,select{
    width:100%;
    padding:10px;
    margin:5px 0;
    border-radius:8px;
    border:none;
}

/* BUTTON */
.btn{
    width:100%;
    padding:12px;
    background:linear-gradient(90deg,gold,#ffdf70);
    border:none;
    font-weight:bold;
    border-radius:10px;
}

/* WA FLOAT */
.wa{
    position:fixed;
    right:15px;
    bottom:15px;
    background:#25D366;
    padding:12px;
    border-radius:50px;
    color:#fff;
    text-decoration:none;
    font-weight:bold;
}

/* ADMIN LIST */
.list{
    max-height:300px;
    overflow:auto;
}
.del{
    background:red;
    border:none;
    color:#fff;
    padding:5px 8px;
    border-radius:5px;
}
</style>
</head>

<body>

<div class="header">
<h1>PUMA TRAVEL FINAL BOSS</h1>
</div>

<!-- NAV -->
<div class="nav">
<button class="active" onclick="tab('home')">Home</button>
<button onclick="tab('booking')">Booking</button>
<button onclick="tab('admin')">Admin</button>
</div>

<!-- HOME -->
<div id="home" class="section active">

<div class="card">
<b>🔥 Pekanbaru → Medan</b><br>
<span class="price">Rp 350.000</span>
</div>

<div class="card">
<b>🔥 Pekanbaru → Sidempuan</b><br>
<span class="price">Rp 200.000</span>
</div>

<div class="card">
<b>🔥 Pekanbaru → Padang</b><br>
<span class="price">Rp 240.000</span>
</div>

</div>

<!-- BOOKING -->
<div id="booking" class="section">

<h3 style="color:gold">Form Booking</h3>

<input id="nama" placeholder="Nama">
<input id="hp" placeholder="No HP">

<select id="rute">
<option>Pilih Rute</option>
<option>Pekanbaru - Medan</option>
<option>Pekanbaru - Sidempuan</option>
<option>Pekanbaru - Padang</option>
<option>Pekanbaru - Dumai</option>
</select>

<button class="btn" onclick="booking()">KIRIM BOOKING</button>

</div>

<!-- ADMIN -->
<div id="admin" class="section">

<h3 style="color:gold">Admin Panel</h3>
<div class="list" id="list"></div>

</div>

<a class="wa" href="https://wa.me/6282384500099">💬 WA</a>

<script>

// TAB
function tab(id){
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));

    document.getElementById(id).classList.add('active');
    event.target.classList.add('active');

    if(id=='admin') loadData();
}

// BOOKING SYSTEM
function booking(){
    let nama=document.getElementById('nama').value;
    let hp=document.getElementById('hp').value;
    let rute=document.getElementById('rute').value;

    let data=JSON.parse(localStorage.getItem('booking')||"[]");
    data.push({nama,hp,rute});
    localStorage.setItem('booking',JSON.stringify(data));

    let msg=`Halo Admin PUMA TRAVEL%0A
Nama: ${nama}%0A
HP: ${hp}%0A
Rute: ${rute}`;

    window.open("https://wa.me/6282384500099?text="+msg,"_blank");

    alert("Booking terkirim!");
}

// ADMIN LOAD
function loadData(){
    let data=JSON.parse(localStorage.getItem('booking')||"[]");
    let list=document.getElementById('list');
    list.innerHTML="";

    data.forEach((d,i)=>{
        list.innerHTML+=`
        <div class="card">
        <b>${d.nama}</b><br>
        ${d.hp}<br>
        ${d.rute}<br>
        <button class="del" onclick="hapus(${i})">Hapus</button>
        </div>`;
    });
}

// DELETE
function hapus(i){
    let data=JSON.parse(localStorage.getItem('booking')||"[]");
    data.splice(i,1);
    localStorage.setItem('booking',JSON.stringify(data));
    loadData();
}

</script>

</body>
</html>
